name: Lint Code Base

# Trigger workflow on push or pull request events to the 'main' branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest  # Defines the operating system for the job

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v2

      # Step 2: Set up the Super Linter to run on the repository code
      - name: Set up Super Linter
        uses: github/super-linter@v3
        env:
          RUN_LOCAL: true
          LINTER_RULES_PATH: .github/linters
